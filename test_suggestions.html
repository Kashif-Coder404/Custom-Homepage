<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggestions API Testing</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --surface: #313244;
            --text: #cdd6f4;
            --primary: #89b4fa;
            --border: #45475a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: var(--primary);
        }
        .container {
            background-color: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        select, input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg);
            color: var(--text);
            font-size: 1rem;
            box-sizing: border-box;
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .results-box {
            margin-top: 1rem;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
        }
        .suggestion-item {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .suggestion-item:last-child {
            border-bottom: none;
        }
        .suggestion-item:hover {
            background-color: var(--surface);
            color: var(--primary);
        }
        .loading {
            padding: 1rem;
            text-align: center;
            color: var(--primary);
            font-style: italic;
            display: none;
        }
        .raw-output {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #11111b;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>
<body>

    <h1>API Testing Lab</h1>
    <div class="container">
        <div class="form-group">
            <label for="apiSelector">Select Suggestions API:</label>
            <select id="apiSelector">
                <option value="duckduckgo">DuckDuckGo Autocomplete</option>
                <option value="wikipedia">Wikipedia OpenSearch</option>
                <option value="google">Google Suggest (May have CORS issues)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="searchInput">Search Query:</label>
            <input type="text" id="searchInput" placeholder="Type something to see suggestions..." autocomplete="off">
        </div>

        <label>Parsed Suggestions:</label>
        <div class="results-box" id="resultsBox">
            <div class="loading" id="loadingIndicator">Fetching data...</div>
            <div id="suggestionsList"></div>
        </div>

        <label style="margin-top: 1.5rem;">Raw JSON Data (from callback):</label>
        <div class="raw-output" id="rawOutput"></div>
    </div>

    <script src="test_suggestions.js"></script>
</body>
</html>
